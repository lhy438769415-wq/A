<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gap + High 2 (两腿回调)</title>
  <script>
    // Set theme before CSS parses to avoid FOUC
    document.documentElement.setAttribute(
      'data-theme',
      (function () { try { return localStorage.getItem('bt-theme') || 'light'; } catch (e) { return 'light'; } })()
    );
  </script>
  <style>
    /* ---------------- design tokens ---------------- */
    :root[data-theme="dark"] {
      --bg: #0d1117;
      --bg-elev: #131722;
      --surface: #161b22;
      --surface-2: #1c2030;
      --hover: #1f2433;
      --border: #1f2230;
      --border-strong: #2a2e3e;
      --text: #d1d4dc;
      --text-strong: #f0f3fa;
      --muted: #787b86;
      --muted-2: #50535e;
      --accent: #2962ff;
      --accent-glow: rgba(41, 98, 255, 0.18);
      --gain: #26a69a;
      --gain-strong: #2dd4bf;
      --gain-glow: rgba(38, 166, 154, 0.18);
      --loss: #ef5350;
      --loss-strong: #f87171;
      --loss-glow: rgba(239, 83, 80, 0.18);
      --warn: #ff9800;
      --neutral: #b2b5be;
      --grid: rgba(255, 255, 255, 0.04);
      --grid-strong: rgba(255, 255, 255, 0.10);
      --crosshair: rgba(160, 167, 184, 0.50);
      --shadow-soft: 0 1px 0 rgba(255,255,255,0.04) inset, 0 8px 24px rgba(0,0,0,0.32);
    }

    :root[data-theme="light"] {
      --bg: #ffffff;
      --bg-elev: #f8f9fc;
      --surface: #ffffff;
      --surface-2: #f3f5f9;
      --hover: #eef1f8;
      --border: #e6e8ee;
      --border-strong: #d6dae3;
      --text: #131722;
      --text-strong: #0a0d14;
      --muted: #6a6d78;
      --muted-2: #8c8f99;
      --accent: #2962ff;
      --accent-glow: rgba(41, 98, 255, 0.12);
      --gain: #089981;
      --gain-strong: #00a884;
      --gain-glow: rgba(8, 153, 129, 0.12);
      --loss: #f23645;
      --loss-strong: #ef4444;
      --loss-glow: rgba(242, 54, 69, 0.12);
      --warn: #ff9800;
      --neutral: #4a4d57;
      --grid: rgba(0, 0, 0, 0.04);
      --grid-strong: rgba(0, 0, 0, 0.08);
      --crosshair: rgba(60, 65, 80, 0.45);
      --shadow-soft: 0 1px 0 rgba(0,0,0,0.02) inset, 0 6px 24px rgba(19,23,34,0.06);
    }

    /* Eastern color convention (A-share / HK): 涨红跌绿 — swap gain/loss palette */
    :root[data-theme="dark"][data-color-scheme="eastern"] {
      --gain: #ef5350;
      --gain-strong: #f87171;
      --gain-glow: rgba(239, 83, 80, 0.18);
      --loss: #26a69a;
      --loss-strong: #2dd4bf;
      --loss-glow: rgba(38, 166, 154, 0.18);
    }
    :root[data-theme="light"][data-color-scheme="eastern"] {
      --gain: #f23645;
      --gain-strong: #ef4444;
      --gain-glow: rgba(242, 54, 69, 0.12);
      --loss: #089981;
      --loss-strong: #00a884;
      --loss-glow: rgba(8, 153, 129, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', sans-serif;
      font-feature-settings: 'tnum' 1, 'cv11' 1, 'ss01' 1;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      font-size: 14px;
      letter-spacing: -0.01em;
    }

    .app { min-height: 100vh; display: flex; flex-direction: column; }

    /* ---------------- topbar ---------------- */
    .topbar {
      height: 50px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      gap: 16px;
      background: color-mix(in srgb, var(--bg) 85%, transparent);
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .tb-left, .tb-right { display: flex; align-items: center; gap: 12px; }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--text-strong);
    }
    .brand-logo {
      width: 24px; height: 24px;
      border-radius: 7px;
      background: linear-gradient(135deg, var(--accent) 0%, #6b8eff 100%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      color: #fff;
      box-shadow: 0 4px 12px var(--accent-glow);
      letter-spacing: 0;
    }
    .brand-sep {
      width: 1px;
      height: 18px;
      background: var(--border);
      margin: 0 4px;
    }
    .brand-strategy {
      color: var(--muted);
      font-weight: 500;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .menu-chip {
      padding: 6px 12px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text);
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
      cursor: default;
      user-select: none;
    }
    .menu-chip:hover { background: var(--hover); }
    .menu-chip.active {
      background: var(--surface-2);
      border-color: var(--border);
      font-weight: 600;
      color: var(--text-strong);
    }

    .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--accent); display: inline-block; }
    .dot.green { background: var(--gain); box-shadow: 0 0 0 2px var(--gain-glow); }

    .icon-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .icon-btn:hover {
      background: var(--hover);
      color: var(--text-strong);
      border-color: var(--border-strong);
    }

    /* ---------------- page ---------------- */
    .page {
      width: 100%;
      max-width: 1480px;
      margin: 0 auto;
      padding: 24px 28px 56px;
    }

    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
      padding: 4px 0 24px;
      animation: fadeUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .report-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-strong);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .symbol-badge {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 6px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace;
      letter-spacing: 0.02em;
    }

    .report-subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .live-pulse {
      width: 7px; height: 7px;
      border-radius: 999px;
      background: var(--gain);
      animation: pulse 2.4s ease-out infinite;
      display: inline-block;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(38, 166, 154, 0.55); }
      70%  { box-shadow: 0 0 0 8px rgba(38, 166, 154, 0); }
      100% { box-shadow: 0 0 0 0 rgba(38, 166, 154, 0); }
    }

    .date-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      color: var(--text);
      font-feature-settings: 'tnum';
    }
    .date-badge .arrow { color: var(--muted); }

    /* ---------------- tabs ---------------- */
    .tabs {
      display: flex;
      align-items: center;
      gap: 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 22px;
      position: relative;
      flex-wrap: wrap;
    }
    .tab {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 13px 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      position: relative;
      transition: color 0.2s ease;
      font-family: inherit;
      letter-spacing: -0.005em;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text-strong); font-weight: 600; }
    .tab-indicator {
      position: absolute;
      bottom: -1px;
      left: 0;
      height: 2px;
      width: 0;
      background: var(--accent);
      border-radius: 2px 2px 0 0;
      transition: transform 0.4s cubic-bezier(0.5, 0, 0.2, 1), width 0.4s cubic-bezier(0.5, 0, 0.2, 1);
      pointer-events: none;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .tab-panels { display: block; }
    .tab-panel {
      display: none;
      animation: fadeUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .tab-panel.active { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---------------- modules ---------------- */
    .module-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 16px;
    }

    .module {
      grid-column: span 12;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      animation: fadeUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .module.span-6 { grid-column: span 6; }
    .module.span-4 { grid-column: span 4; }
    .module.span-8 { grid-column: span 8; }

    .module-grid > .module:nth-child(1) { animation-delay: 0.05s; }
    .module-grid > .module:nth-child(2) { animation-delay: 0.12s; }
    .module-grid > .module:nth-child(3) { animation-delay: 0.18s; }
    .module-grid > .module:nth-child(4) { animation-delay: 0.24s; }
    .module-grid > .module:nth-child(5) { animation-delay: 0.30s; }

    .module-header {
      padding: 22px 24px 4px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .module-header > div:first-child {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .module-title {
      font-size: 18px;
      font-weight: 600;
      margin: 0;
      color: var(--text-strong);
      letter-spacing: -0.01em;
      line-height: 1.25;
    }
    .module-subtitle {
      font-size: 13px;
      color: var(--muted);
      margin: 0;
      line-height: 1.4;
    }
    .module-body { padding: 18px 22px; }

    /* ---------------- KPI strip ---------------- */
    .kpi-strip {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 28px;
    }
    .kpi-item { min-width: 0; }
    .kpi-label {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }
    .kpi-value {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.2;
      color: var(--text-strong);
      font-feature-settings: 'tnum';
      letter-spacing: -0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .kpi-sub {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      font-feature-settings: 'tnum';
    }

    .positive { color: var(--gain) !important; }
    .negative { color: var(--loss) !important; }

    /* ---------------- chart card ---------------- */
    .tv-chart-card { padding: 0; }
    .tv-chart-top {
      padding: 22px 24px 20px;
      display: flex;
      align-items: flex-start;
      gap: 24px;
      border-bottom: 1px solid var(--border);
    }
    .tv-chart-stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 28px;
      flex: 1;
    }

    .tv-chart-area { padding: 0; position: relative; }

    .chart-shell {
      width: 100%;
      height: 460px;
      position: relative;
      background: transparent;
    }
    .chart-shell svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }
    .chart-shell svg text { font-family: inherit; }

    .chart-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 24px 16px;
      border-top: 1px solid var(--border);
    }
    .toggle-row {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      font-size: 13px;
    }
    .toggle-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
    }
    .toggle-item:hover { background: var(--hover); }
    .toggle-item.muted { color: var(--muted-2); }
    .toggle-item.muted .toggle-swatch { opacity: 0.35; }
    .toggle-swatch {
      width: 14px;
      height: 3px;
      border-radius: 2px;
      background: var(--gain);
      transition: opacity 0.15s;
    }
    /* Marker legend lives inside toggle-row, separated by a divider.
       Items are informational (not clickable) so they don't carry .toggle-item. */
    .legend-divider {
      width: 1px;
      height: 14px;
      background: var(--border);
      margin: 0 6px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 4px;
      color: var(--muted);
      font-size: 12px;
      user-select: none;
    }
    .legend-item svg { display: block; }

    .mode-switch {
      display: inline-flex;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }
    .mode-chip {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.18s ease;
      user-select: none;
    }
    .mode-chip:hover { color: var(--text); }
    .mode-chip.active {
      background: var(--bg);
      color: var(--text-strong);
      font-weight: 600;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.18);
    }

    /* ---------------- tooltip ---------------- */
    .tooltip {
      position: absolute;
      top: 18px;
      left: 18px;
      background: color-mix(in srgb, var(--surface-2) 92%, transparent);
      border: 1px solid var(--border-strong);
      border-radius: 9px;
      padding: 12px 14px;
      font-size: 12px;
      pointer-events: none;
      z-index: 5;
      min-width: 200px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      font-feature-settings: 'tnum';
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: opacity 0.12s ease;
    }
    .tooltip.hidden { opacity: 0; }
    .tooltip-date {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 9px;
      font-weight: 600;
    }
    .tooltip-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 3px 0;
    }
    .tooltip-row .key {
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .tooltip-row .key::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      background: var(--swatch, var(--accent));
      flex-shrink: 0;
    }
    .tooltip-row .val {
      color: var(--text-strong);
      font-weight: 600;
    }

    /* ---------------- tables ---------------- */
    .metric-table {
      width: 100%;
      border-collapse: collapse;
      font-feature-settings: 'tnum';
    }
    .metric-table-wrap { overflow-x: auto; }
    .metric-table th, .metric-table td {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      text-align: right;
      vertical-align: middle;
    }
    .metric-table th:first-child, .metric-table td:first-child {
      text-align: left;
      width: 40%;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      white-space: normal;
    }
    .metric-table th:not(:first-child), .metric-table td:not(:first-child) { white-space: nowrap; }
    .metric-table td:not(:first-child) {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-strong);
      font-variant-numeric: tabular-nums;
    }
    .metric-table thead th {
      color: var(--muted);
      font-weight: 500;
      font-size: 12px;
      text-transform: none;
      letter-spacing: 0;
      background: transparent;
      border-bottom: 1px solid var(--border);
    }
    .metric-table tbody tr { transition: background 0.12s ease; }
    .metric-table tbody tr:hover { background: var(--hover); }
    .metric-table tbody tr:last-child td { border-bottom: 0; }
    .metric-main {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-strong);
    }
    .metric-secondary {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
      font-weight: 500;
    }

    .trades-table-wrap { overflow-x: auto; }
    .trades-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
      font-feature-settings: 'tnum';
    }
    .trades-table th, .trades-table td {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      white-space: nowrap;
    }
    .trades-table td {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-strong);
    }
    .trades-table td.num,
    .trades-table th.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .trades-table thead th {
      color: var(--muted);
      font-size: 12px;
      text-transform: none;
      letter-spacing: 0;
      background: transparent;
      position: sticky;
      top: 0;
      font-weight: 500;
      border-bottom: 1px solid var(--border);
    }
    .trades-table tbody tr { transition: background 0.12s ease; }
    .trades-table tbody tr:hover { background: var(--hover); }
    .trades-table tbody tr:last-child td { border-bottom: 0; }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 9px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .text-card {
      color: var(--text);
      line-height: 1.7;
      font-size: 14px;
    }
    .text-card > * + * { margin-top: 12px; }
    .text-card h1, .text-card h2, .text-card h3, .text-card h4, .text-card h5, .text-card h6 {
      color: var(--text-strong);
      line-height: 1.3;
      margin-top: 20px;
    }
    .text-card h1:first-child, .text-card h2:first-child, .text-card h3:first-child,
    .text-card h4:first-child, .text-card h5:first-child, .text-card h6:first-child {
      margin-top: 0;
    }
    .text-card p, .text-card ul, .text-card ol, .text-card blockquote, .text-card pre, .text-card table {
      margin: 0;
    }
    .text-card ul, .text-card ol {
      padding-left: 20px;
    }
    .text-card li + li {
      margin-top: 6px;
    }
    .text-card a {
      color: var(--accent);
      text-decoration: none;
    }
    .text-card a:hover {
      text-decoration: underline;
    }
    .text-card code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 6px;
      background: var(--surface-2);
      border: 1px solid var(--border);
    }
    .text-card pre {
      overflow-x: auto;
      padding: 12px 14px;
      border-radius: 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
    }
    .text-card pre code {
      padding: 0;
      border: 0;
      background: transparent;
    }
    .text-card blockquote {
      padding-left: 14px;
      border-left: 3px solid var(--accent);
      color: var(--muted);
    }
    .text-card table {
      width: 100%;
      border-collapse: collapse;
      font-feature-settings: 'tnum';
    }
    .text-card th, .text-card td {
      padding: 10px 12px;
      border: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }
    .text-card thead th {
      background: var(--surface-2);
      color: var(--text-strong);
      font-size: 12px;
      font-weight: 600;
    }
    .text-card hr {
      border: 0;
