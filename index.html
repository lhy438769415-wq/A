l": -356125.05, "pnl_pct": -8.55, "holding_bars": 18, "symbol": "603730", "symbol_name": "", "display_symbol": "603730"}, {"entry_date": "2026-03-05", "exit_date": "2026-03-09", "side": "long", "size": 106500.0, "entry_price": 35.75, "exit_price": 33.02, "pnl": -294700.52, "pnl_pct": -7.74, "holding_bars": 2, "symbol": "605589", "symbol_name": "", "display_symbol": "605589"}, {"entry_date": "2026-03-10", "exit_date": "2026-03-12", "side": "long", "size": 374000.0, "entry_price": 9.4, "exit_price": 11.57, "pnl": 807063.58, "pnl_pct": 22.95, "holding_bars": 2, "symbol": "600172", "symbol_name": "", "display_symbol": "600172"}, {"entry_date": "2026-03-16", "exit_date": "2026-03-20", "side": "long", "size": 294800.0, "entry_price": 14.66, "exit_price": 13.23, "pnl": -425980.69, "pnl_pct": -9.85, "holding_bars": 4, "symbol": "002140", "symbol_name": "", "display_symbol": "002140"}, {"entry_date": "2026-03-27", "exit_date": "2026-05-14", "side": "long", "size": 242700.0, "entry_price": 16.05, "exit_price": 19.1, "pnl": 735357.94, "pnl_pct": 18.87, "holding_bars": 30, "symbol": "001896", "symbol_name": "", "display_symbol": "001896"}, {"entry_date": "2026-05-15", "exit_date": "2026-05-22", "side": "long", "size": 1921900.0, "entry_price": 2.41, "exit_price": 2.63, "pnl": 417384.79, "pnl_pct": 9.01, "holding_bars": 5, "symbol": "002496", "symbol_name": "", "display_symbol": "002496"}], "columns": [{"key": "display_symbol", "label": "标的", "format": "text"}, {"key": "side", "label": "方向", "format": "pill"}, {"key": "entry_date", "label": "开仓日", "format": "text"}, {"key": "exit_date", "label": "平仓日", "format": "text"}, {"key": "holding_bars", "label": "持有 Bar", "format": "text"}, {"key": "size", "label": "数量", "format": "number"}, {"key": "entry_price", "label": "开仓价", "format": "number"}, {"key": "exit_price", "label": "平仓价", "format": "number"}, {"key": "pnl", "label": "盈亏", "format": "sign"}, {"key": "pnl_pct", "label": "盈亏 %", "format": "pct"}]}]}</script>
  <script>
  (function () {
    'use strict';

    const REPORT = JSON.parse(document.getElementById('report-data').textContent || '{}');
    const ROOT = document.documentElement;

    // Color scheme: can be overridden via report_data.ui.color_scheme
    // ("eastern" | "western"). If not provided, derive from meta.market;
    // when market is missing/unknown, default to eastern (涨红跌绿).
    (function () {
      var ui = REPORT.ui || {};
      var meta = REPORT.meta || {};
      var scheme = ui.color_scheme;
      if (!scheme) {
        var mk = String(meta.market || '').toLowerCase();
        if (mk === 'china_a' || mk === 'a股' || mk === 'cn' || mk === 'cn-stock' ||
            mk === 'hong_kong' || mk === 'hk' || mk === 'hk-stock') {
          scheme = 'eastern';
        } else if (mk === 'us_stock' || mk === 'us' || mk === 'usa' || mk === 'us-market' ||
                   mk === 'america' || mk === 'american') {
          scheme = 'western';
        } else {
          scheme = 'eastern';
        }
      }
      if (scheme === 'eastern') ROOT.setAttribute('data-color-scheme', 'eastern');
      else ROOT.setAttribute('data-color-scheme', 'western');
    })();

    // i18n bag from report_data.ui.i18n; fallbacks keep behavior backward-compatible
    // for older payloads (default is Chinese — the skill is Chinese-first).
    const I18N = (REPORT.ui && REPORT.ui.i18n) || {};
    function t(key, fallback) {
      return I18N[key] != null ? I18N[key] : fallback;
    }

    // ---------------- format helpers ----------------
    function parseNumeric(value) {
      if (value == null) return null;
      if (typeof value === 'number') return Number.isFinite(value) ? value : null;
      var text = String(value).trim();
      if (!text) return null;
      var negativeByParens = false;
      if (/^\(.*\)$/.test(text)) {
        negativeByParens = true;
        text = text.slice(1, -1).trim();
      }
      text = text
        .replace(/,/g, '')
        .replace(/%/g, '')
        .replace(/\s+/g, '')
        .replace(/\u2212/g, '-');
      if (!text) return null;
      var num = Number(text);
      if (!Number.isFinite(num)) return null;
      return negativeByParens ? -Math.abs(num) : num;
    }
    function nf(value, digits) {
      if (digits == null) digits = 2;
      var num = parseNumeric(value);
      if (num == null) return '--';
      return num.toLocaleString('en-US', {
        minimumFractionDigits: digits,
        maximumFractionDigits: digits,
      });
    }
    function pf(value, digits) {
      if (digits == null) digits = 2;
      var num = parseNumeric(value);
      if (num == null) return '--';
      return nf(num, digits) + '%';
    }
    function signed(value, digits, suffix) {
      if (digits == null) digits = 2;
      if (suffix == null) suffix = '';
      const num = parseNumeric(value);
      if (num == null) return '--';
      return (num > 0 ? '+' : '') + nf(num, digits) + suffix;
    }
    function signClass(value) {
      const num = parseNumeric(value);
      if (num == null) return '';
      return num >= 0 ? 'positive' : 'negative';
    }
    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }
    function renderMarkdownFallback(s) {
      if (s == null) return '';
      var text = escapeHtml(String(s));
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/&lt;br\s*\/?&gt;/gi, '<br>');
      text = text.replace(/\n/g, '<br>');
      return text;
    }
    function renderMarkdown(s) {
      if (s == null) return '';
      var source = String(s);
      if (window.marked && typeof window.marked.parse === 'function') {
        try {
          var rendered = window.marked.parse(source, {
            gfm: true,
            breaks: true,
            headerIds: false,
            mangle: false,
          });
          if (window.DOMPurify && typeof window.DOMPurify.sanitize === 'function') {
            return window.DOMPurify.sanitize(rendered);
          }
          console.warn('DOMPurify unavailable, falling back to basic markdown renderer.');
        } catch (e) {
          console.warn('markdown render failed, falling back to basic renderer:', e);
        }
      }
      return renderMarkdownFallback(source);
    }
    function axisLabel(point) {
      const raw = point && (point.date != null ? point.date : (point.x != null ? point.x : point.label));
      if (!raw) return '';
      const text = String(raw);
      if (/^\d{4}-\d{2}-\d{2}$/.test(text)) return text.slice(5);
      if (/^\d{4}-\d{2}$/.test(text)) return text;
      return text;
    }
    function fullLabel(point) {
      const raw = point && (point.date != null ? point.date : (point.x != null ? point.x : point.label));
      return raw ? String(raw) : '';
    }

    // ---------------- topbar ----------------
    function renderTopbar(meta, ui) {
      const left = document.getElementById('topbar-left');
      const right = document.getElementById('topbar-right');
      const menu = (ui && ui.topbar_menu) || [];
      const windowStatus = ((ui && ui.window_status) || '').trim();

      // Brand badge removed — strategy name and symbol are already shown
      // prominently in the header section below the topbar.
      let leftHtml = menu.map(function (item) {
        return '<div class="menu-chip ' + (item.active ? 'active' : '') + '">' +
          escapeHtml(item.label) +
          (item.dot ? '<span class="dot ' + (item.dot === 'green' ? 'green' : '') + '"></span>' : '') +
        '</div>';
      }).join('');
      left.innerHTML = leftHtml;

      const themeBtn =
        '<button class="icon-btn" id="theme-toggle" title="Toggle theme">' +
          '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
            '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>' +
          '</svg>' +
        '</button>';
      right.innerHTML =
        (windowStatus ? '<div class="menu-chip">' + escapeHtml(windowStatus) + '</div>' : '') +
        themeBtn;

      document.getElementById('theme-toggle').addEventListener('click', function () {
        const cur = ROOT.getAttribute('data-theme');
        const next = cur === 'dark' ? 'light' : 'dark';
        ROOT.setAttribute('data-theme', next);
        try { localStorage.setItem('bt-theme', next); } catch (e) { /* ignore */ }
      });
    }

    function renderHeader(meta, ui) {
      const titleEl = document.getElementById('report-title');
      const subtitleEl = document.getElementById('report-subtitle');
      const dateEl = document.getElementById('report-date');

      const strategy = escapeHtml((meta && meta.strategy_name) || 'Strategy');
      const symbol = (meta && meta.symbol) || '';
      titleEl.innerHTML = strategy + (symbol ? ' <span class="symbol-badge">' + escapeHtml(symbol) + '</span>' : '');

      const subtitle = (ui && ui.subtitle) || t('subtitle_fallback', '回测看板');
      subtitleEl.innerHTML = '<span class="live-pulse"></span>' + escapeHtml(subtitle);

      const start = (meta && meta.start) || '--';
      const end = (meta && meta.end) || '--';
      dateEl.innerHTML =
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
          '<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>' +
          '<line x1="16" y1="2" x2="16" y2="6"/>' +
          '<line x1="8" y1="2" x2="8" y2="6"/>' +
          '<line x1="3" y1="10" x2="21" y2="10"/>' +
        '</svg>' +
        escapeHtml(start) + '<span class="arrow">→</span>' + escapeHtml(end);
    }

    // ---------------- module render ----------------
    function renderKpi(item) {
      return (
        '<div class="kpi-item">' +
          '<div class="kpi-label">' + escapeHtml(item.label) + '</div>' +
          '<div class="kpi-value ' + signClass(item.raw) + '">' + escapeHtml(item.value) + '</div>' +
          (item.subvalue ? '<div class="kpi-sub ' + signClass(item.subraw) + '">' + escapeHtml(item.subvalue) + '</div>' : '') +
        '</div>'
      );
    }

    function formatMetricCell(metric) {
      const main = metric && metric.main !== undefined ? metric.main : '--';
      const secondary = metric && metric.secondary !== undefined ? metric.secondary : '';
      const cls = signClass(metric && metric.raw);
      return (
        '<div class="metric-main ' + cls + '">' + escapeHtml(main) + '</div>' +
        (secondary ? '<div class="metric-secondary ' + cls + '">' + escapeHtml(secondary) + '</div>' : '')
      );
    }

    function renderModule(module, idx) {
      const span =
        module.width === 'half' ? 'span-6' :
        module.width === 'third' ? 'span-4' :
        module.width === 'two-third' ? 'span-8' : '';

      const titleHtml = module.title
        ? '<div class="module-header"><div><h3 class="module-title">' + escapeHtml(module.title) + '</h3>' +
            (module.subtitle ? '<p class="module-subtitle">' + escapeHtml(module.subtitle) + '</p>' : '') +
          '</div></div>'
        : '';

      if (module.type === 'stats_strip') {
        const items = module.items || [];
        return (
          '<article class="module ' + span + '" data-module="' + idx + '">' +
            titleHtml +
            '<div class="module-body"><div class="kpi-strip">' +
              items.map(renderKpi).join('') +
            '</div></div>' +
          '</article>'
        );
      }

      if (module.type === 'overview_chart') {
        const stats = module.stats || [];
        const toggles = module.toggles || [];
        const modes = module.modes || [];
        // Marker legend: which action types actually appear in this module's markers?
        // Only show legend entries for actions that are present, so a long-only
        // strategy doesn't get cluttered with short/cover entries.
        const legendActions = new Set();
        (module.markers || []).forEach(function (m) {
          const a = (m.action || '').toLowerCase();
          if (a) legendActions.add(a);
        });
        // Inline SVG triangles that visually match the chart markers.
        // entry actions point UP (apex on top), exit actions point DOWN.
        function legendTri(direction, color) {
          // 12x10 viewBox; up triangle apex at (6,1), down triangle apex at (6,9)
          const points = direction === 'up'
            ? '6,1 1,9 11,9'
            : '6,9 1,1 11,1';
          return '<svg width="12" height="10" viewBox="0 0 12 10">' +
            '<polygon points="' + points + '" fill="' + color + '" />' +
            '</svg>';
        }
        const LEGEND_DEFS = [
          { action: 'buy',   dir: 'up',   color: 'var(--gain)', label: t('marker_buy',   '买入') },
          { action: 'sell',  dir: 'down', color: 'var(--loss)', label: t('marker_sell',  '卖出') },
          { action: 'short', dir: 'up',   color: 'var(--loss)', label: t('marker_short', '做空') },
          { action: 'cover', dir: 'down', color: 'var(--gain)', label: t('marker_cover', '平空') },
        ];
        const legendHtml = LEGEND_DEFS
          .filter(function (def) { return legendActions.has(def.action); })
          .map(function (def) {
            return '<span class="legend-item">' +
              legendTri(def.dir, def.color) +
              escapeHtml(def.label) +
            '</span>';
          })
          .join('');
        return (
          '<article class="module tv-chart-card ' + span + '" data-module="' + idx + '">' +
            '<div class="tv-chart-top"><div class="tv-chart-stats">' +
              stats.map(renderKpi).join('') +
            '</div></div>' +
            '<div class="tv-chart-area" id="module-host-' + idx + '"></div>' +
            '<div class="chart-controls">' +
              '<div class="toggle-row">' +
                toggles.map(function (tg) {
                  const id = tg.id || (tg.label || '').toLowerCase().replace(/[^a-z0-9]+/g, '_');
                  const swatch = tg.color || (id.indexOf('drawdown') >= 0 ? 'var(--loss)' : (id.indexOf('buy') >= 0 ? 'var(--accent)' : 'var(--gain)'));
                  return '<span class="toggle-item ' + (tg.checked ? '' : 'muted') + '" data-toggle="' + id + '">' +
                    '<span class="toggle-swatch" style="background:' + swatch + '"></span>' +
                    escapeHtml(tg.label) +
                  '</span>';
                }).join('') +
                (module.overlay_series || []).map(function (s, sIdx) {
                  return '<span class="toggle-item" data-toggle="overlay_' + sIdx + '">' +
                    '<span class="toggle-swatch" style="background:' + (s.stroke || '#ff9800') + '"></span>' +
                    escapeHtml(s.name || 'Overlay ' + (sIdx + 1)) +
                  '</span>';
                }).join('') +
                (legendHtml ? '<span class="legend-divider"></span>' + legendHtml : '') +
              '</div>' +
              '<div class="mode-switch">' +
                modes.map(function (m) {
                  const id = m.id || (m.label || '').toLowerCase();
                  return '<span class="mode-chip ' + (m.active ? 'active' : '') + '" data-mode="' + id + '">' + escapeHtml(m.label) + '</span>';
                }).join('') +
              '</div>' +
            '</div>' +
          '</article>'
        );
      }

      if (module.type === 'metric_table') {
        const cols = module.columns || [];
        const rows = module.rows || [];
        return (
          '<article class="module ' + span + '" data-module="' + idx + '">' +
            titleHtml +
            '<div class="module-body" style="padding:8px 0 0;">' +
              '<div class="metric-table-wrap"><table class="metric-table"><thead><tr>' +
                  cols.map(function (c) { return '<th>' + escapeHtml(c) + '</th>'; }).join('') +
                '</tr></thead><tbody>' +
                  rows.map(function (row) {
                    return '<tr><td>' + escapeHtml(row.metric) + '</td>' +
                      (row.values || []).map(function (v) { return '<td>' + formatMetricCell(v) + '</td>'; }).join('') +
                    '</tr>';
                  }).join('') +
                '</tbody></table></div>' +
            '</div>' +
          '</article>'
        );
      }

      if (module.type === 'trades_table') {
        const rows = module.rows || [];
        const longLabel = t('side_long', 'long');
        const shortLabel = t('side_short', 'short');

        // Custom columns: if module.columns is provided, use it.
        // Otherwise fall back to the default 10-column layout.
        // Each column: { key: "field_name", label: "显示名", format: "text"|"number"|"pct"|"sign"|"pill" }
        var cols = module.columns || [
          {key: 'symbol',      label: t('trades_col_symbol', '标的'),     format: 'text'},
          {key: 'side',        label: t('trades_col_side', '方向'),       format: 'pill'},
          {key: 'entry_date',  label: t('trades_col_entry_date', '开仓日'), format: 'text'},
          {key: 'exit_date',   label: t('trades_col_exit_date', '平仓日'), format: 'text'},
          {key: 'holding_bars',label: t('trades_col_holding', '持有 Bar'), format: 'text'},
          {key: 'size',        label: t('trades_col_size', '数量'),       format: 'number'},
          {key: 'entry_price', label: t('trades_col_entry_price', '开仓价'), format: 'number'},
          {key: 'exit_price',  label: t('trades_col_exit_price', '平仓价'), format: 'number'},
          {key: 'pnl',         label: t('trades_col_pnl', '盈亏'),       format: 'sign'},
          {key: 'pnl_pct',     label: t('trades_col_pnl_pct', '盈亏 %'), format: 'pct'},
        ];

        function renderCell(tr, col) {
          var val = tr[col.key];
          var fmt = col.format || 'text';
          if (val == null || val === '') return '<td>--</td>';
          if (fmt === 'pill') {
            var sideRaw = String(val);
            var sideText = sideRaw === 'long' ? longLabel : sideRaw === 'short' ? shortLabel : sideRaw;
            return '<td><span class="pill">' + escapeHtml(sideText) + '</span></td>';
          }
          if (fmt === 'number') return '<td class="num">' + escapeHtml(nf(val)) + '</td>';
          if (fmt === 'pct') {
            var pctCls = signClass(val);
            return '<td class="num ' + pctCls + '">' + escapeHtml(pf(val)) + '</td>';
          }
          if (fmt === 'sign') {
            var signCls = signClass(val);
            return '<td class="num ' + signCls + '">' + escapeHtml(nf(val)) + '</td>';
          }
          return '<td>' + escapeHtml(String(val)) + '</td>';
        }

        // Sync 'num' class to <th> so right-alignment + tabular nums apply.
        function thClass(col) {
          var fmt = col.format || 'text';
          return (fmt === 'number' || fmt === 'pct' || fmt === 'sign') ? 'num' : '';
        }

        const body = rows.length
          ? rows.map(function (tr) {
              return '<tr>' + cols.map(function (col) { return renderCell(tr, col); }).join('') + '</tr>';
            }).join('')
          : '<tr><td colspan="' + cols.length + '" class="empty">' + escapeHtml(t('empty_trades', '暂无已平仓交易')) + '</td></tr>';
        return (
          '<article class="module ' + span + '" data-module="' + idx + '">' +
            titleHtml +
            '<div class="trades-table-wrap"><table class="trades-table"><thead><tr>' +
              cols.map(function (col) {
                var c = thClass(col);
                return '<th' + (c ? ' class="' + c + '"' : '') + '>' + escapeHtml(col.label) + '</th>';
              }).join('') +
            '</tr></thead><tbody>' + body + '</tbody></table></div>' +
          '</article>'
        );
      }

      if (module.type === 'line_chart') {
        return (
          '<article class="module ' + span + '" data-module="' + idx + '">' +
            titleHtml +
            '<div style="padding:8px 0 0;"><div id="module-host-' + idx + '"></div></div>' +
          '</article>'
        );
      }

      if (module.type === 'custom_html') {
        // Host div only — actual innerHTML injection + <script> re-execution
        // + mount_script invocation happens in mountCharts() after the
        // element is in the DOM.
        return (
          '<article class="module ' + span + '" data-module="' + idx + '">' +
            titleHtml +
            '<div class="module-body custom-html-body" id="module-host-' + idx + '"></div>' +
          '</article>'
        );
      }

      return (
        '<article class="module ' + span + '" data-module="' + idx + '">' +
          titleHtml +
          '<div class="module-body text-card">' + renderMarkdown(module.text || t('empty_content', '暂无内容')) + '</div>' +
        '</article>'
      );
    }

    // ---------------- chart engine: overview (equity + drawdown panes) ----------------
    function buildOverviewChart(host, module, idx) {
      const points = (module.points || []).filter(function (p) { return p && p.equity != null; });
      const toggles = module.toggles || [];
      const modes = module.modes || [];

      const wrap = document.createElement('div');
      wrap.className = 'chart-shell';

      const tooltip = document.createElement('div');
      tooltip.className = 'tooltip hidden';
      wrap.appendChild(tooltip);

      const svgNS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(svgNS, 'svg');
      wrap.appendChild(svg);

      host.appendChild(wrap);

      function initialToggleState(token, fallback) {
        const found = toggles.find(function (tg) {
          return String(tg.id || '').toLowerCase().indexOf(token) >= 0;
        });
        return found && typeof found.checked === 'boolean' ? found.checked : fallback;
      }
      function initialModeState() {
        const active = modes.find(function (m) { return !!m.active; });
        const id = String(active && active.id ? active.id : '').toLowerCase();
        return id === 'absolute' ? 'absolute' : 'percentage';
      }
      let mode = initialModeState();
      let showDrawdown = initialToggleState('drawdown', true);
      let showTrades = initialToggleState('trade', true);
      let firstRender = true;

      // overlay series: constructed once, visibility state persists across renders
      const overlaySeries = (module.overlay_series || []).map(function (s) {
        var dateLookup = {};
        (s.points || []).forEach(function (p) { dateLookup[p.date] = Number(p.value); });
        return { name: s.name || '', stroke: s.stroke || '#ff9800', dateLookup: dateLookup, visible: true };
      });

      // marker layer: build date → equity-curve index lookup once,
      // then on every render we map markers to pixel coords.
      const rawMarkers = module.markers || [];
      const dateIndex = {};
      points.forEach(function (p, i) { if (p && p.date) dateIndex[p.date] = i; });
      const markers = rawMarkers
        .map(function (m) {
          const i = dateIndex[m.date];
          if (i == null) return null;
          return Object.assign({}, m, { _idx: i });
        })
        .filter(function (m) { return m !== null; });

      function compute() {
        // Main equity line follows the display mode.
        let eqVals;
        if (mode === 'percentage') {
          const base = Number(points[0].equity);
          eqVals = points.map(function (p) {
            return base ? (Number(p.equity) / base - 1) * 100 : 0;
          });
        } else {
          eqVals = points.map(function (p) { return Number(p.equity); });
        }
        // Drawdown is always computed on raw equity using the standard MDD
        // formula (peak-to-trough as % of peak). This keeps the number
        // consistent with summary.json's max_drawdown_pct regardless of which
        // display mode the main line is in.
        let peak = -Infinity;
        const ddVals = points.map(function (p) {
          const eq = Number(p.equity);
          peak = Math.max(peak, eq);
          return peak === 0 ? 0 : (eq / peak - 1) * 100;
        });
        return { eqVals: eqVals, ddVals: ddVals };
      }

      function render() {
        const W = wrap.clientWidth || 1200;
        const H = wrap.clientHeight || 460;
        const PAD_L = 16, PAD_R = 78;
        const TOP = 22;
        const X_AX_H = 36;
        const SEP = 14;
        const DD_RATIO = showDrawdown ? 0.22 : 0;
        const availH = H - TOP - X_AX_H;
        const DD_H = showDrawdown ? Math.max(60, Math.min(110, availH * DD_RATIO)) : 0;
        const EQ_H = availH - DD_H - (showDrawdown ? SEP : 0);
        const eqTop = TOP;
        const eqBot = eqTop + EQ_H;
        const ddTop = eqBot + SEP;
        const ddBot = ddTop + DD_H;
        const xAxisY = (showDrawdown ? ddBot : eqBot) + 6;
        const INNER_W = W - PAD_L - PAD_R;

        svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
        svg.setAttribute('width', W);
        svg.setAttribute('height', H);
        svg.innerHTML = '';

        if (!points.length) {
          svg.innerHTML = '<text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#787b86" font-size="14">' + escapeHtml(t('empty_data', '暂无数据')) + '</text>';
          return;
        }

        const computed = compute();
        const eqVals = computed.eqVals;
        const ddVals = computed.ddVals;

        // compute overlay values for current mode (visibility state lives in outer scope)
        overlaySeries.forEach(function (s) {
          s.vals = points.map(function (p) {
            var v = s.dateLookup[p.date];
            return v != null ? v : null;
          });
          if (mode === 'percentage') {
            var first = null;
            for (var k = 0; k < s.vals.length; k++) { if (s.vals[k] != null) { first = s.vals[k]; break; } }
            if (first) s.vals = s.vals.map(function (v) { return v != null ? (v / first - 1) * 100 : null; });
          }
        });

        let eqMin = Math.min.apply(null, eqVals);
        let eqMax = Math.max.apply(null, eqVals);
        // include overlay values in y-axis range
        overlaySeries.forEach(function (s) {
          s.vals.forEach(function (v) {
            if (v != null) { eqMin = Math.min(eqMin, v); eqMax = Math.max(eqMax, v); }
          });
        });
        if (eqMin === eqMax) { eqMin -= 1; eqMax += 1; }
        const ePad = (eqMax - eqMin) * 0.10;
        eqMin -= ePad * 0.6;
        eqMax += ePad * 0.4;

        let ddMin = Math.min.apply(null, ddVals);
        ddMin = Math.min(ddMin, 0);
        if (ddMin === 0) ddMin = -1;
        const ddMax = 0;

        const N = points.length;
        const xPx = function (i) {
          if (N === 1) return PAD_L + INNER_W / 2;
          return PAD_L + (i / (N - 1)) * INNER_W;
        };
        const eyPx = function (v) {
          return eqTop + (1 - (v - eqMin) / (eqMax - eqMin)) * EQ_H;
        };
        const dyPx = function (v) {
          if (DD_H === 0) return ddTop;
          return ddTop + (1 - (v - ddMin) / (ddMax - ddMin)) * DD_H;
        };

        const cs = getComputedStyle(ROOT);
        const gainColor = cs.getPropertyValue('--gain').trim() || '#26a69a';
        const lossColor = cs.getPropertyValue('--loss').trim() || '#ef5350';
        const isUp = eqVals[N - 1] >= eqVals[0];
        const eqColor = isUp ? gainColor : lossColor;
        const gridColor = cs.getPropertyValue('--grid').trim() || 'rgba(0,0,0,0.04)';
        const mutedColor = cs.getPropertyValue('--muted').trim() || '#6a6d78';
        const strongMuted = cs.getPropertyValue('--text').trim() || '#131722';
        const surfaceColor = cs.getPropertyValue('--surface-2').trim() || '#f3f5f9';
        const borderStrong = cs.getPropertyValue('--border-strong').trim() || '#d6dae3';
        const bgColor = cs.getPropertyValue('--bg').trim() || '#ffffff';

        const meta = REPORT.meta || {};

        // ---- equity grid + y labels
        const eqGridSteps = 5;
        for (let i = 0; i <= eqGridSteps; i++) {
          const y = eqTop + (i / eqGridSteps) * EQ_H;
          const line = document.createElementNS(svgNS, 'line');
          line.setAttribute('x1', PAD_L);
          line.setAttribute('y1', y);
          line.setAttribute('x2', PAD_L + INNER_W);
          line.setAttribute('y2', y);
          line.setAttribute('stroke', gridColor);
          line.setAttribute('stroke-width', '1');
          svg.appendChild(line);

          const val = eqMax - (i / eqGridSteps) * (eqMax - eqMin);
          const label = document.createElementNS(svgNS, 'text');
          label.setAttribute('x', W - 10);
          label.setAttribute('y', y + 4);
          label.setAttribute('text-anchor', 'end');
          label.setAttribute('fill', mutedColor);
          label.setAttribute('font-size', '11');
          label.textContent = nf(val, 2) + (mode === 'percentage' ? '%' : '');
          svg.appendChild(label);
        }

        // ---- equity area + line
        const eqLinePts = eqVals.map(function (v, i) { return [xPx(i), eyPx(v)]; });
        const gradId = 'eq-grad-' + idx;
        const defs = document.createElementNS(svgNS, 'defs');
        const grad = document.createElementNS(svgNS, 'linearGradient');
        grad.setAttribute('id', gradId);
        grad.setAttribute('x1', '0');
        grad.setAttribute('y1', '0');
        grad.setAttribute('x2', '0');
        grad.setAttribute('y2', '1');
        const stop1 = document.createElementNS(svgNS, 'stop');
        stop1.setAttribute('offset', '0%');
        stop1.setAttribute('stop-color', eqColor);
        stop1.setAttribute('stop-opacity', '0.34');
        const stop2 = document.createElementNS(svgNS, 'stop');
        stop2.setAttribute('offset', '100%');
        stop2.setAttribute('stop-color', eqColor);
        stop2.setAttribute('stop-opacity', '0');
        grad.appendChild(stop1);
        grad.appendChild(stop2);
        defs.appendChild(grad);
        svg.appendChild(defs);

        const areaD =
          'M ' + eqLinePts[0][0] + ',' + eqBot + ' ' +
          eqLinePts.map(function (pt) { return 'L ' + pt[0] + ',' + pt[1]; }).join(' ') +
          ' L ' + eqLinePts[N - 1][0] + ',' + eqBot + ' Z';
        const areaPath = document.createElementNS(svgNS, 'path');
        areaPath.setAttribute('d', areaD);
        areaPath.setAttribute('fill', 'url(#' + gradId + ')');
        areaPath.setAttribute('class', 'area-path');
        svg.appendChild(areaPath);

        const linePoly = document.createElementNS(svgNS, 'polyline');
        linePoly.setAttribute('points', eqLinePts.map(function (pt) { return pt[0] + ',' + pt[1]; }).join(' '));
        linePoly.setAttribute('fill', 'none');
        linePoly.setAttribute('stroke', eqColor);
        linePoly.setAttribute('stroke-width', '1.8');
        linePoly.setAttribute('stroke-linecap', 'round');
        linePoly.setAttribute('stroke-linejoin', 'round');
        linePoly.setAttribute('class', 'main-line');
        svg.appendChild(linePoly);

        // ---- overlay series (additional lines on the same chart)
        var overlayPolylines = [];
        overlaySeries.forEach(function (s, sIdx) {
          var pts = [];
          s.vals.forEach(function (v, i) {
            if (v != null) pts.push(xPx(i) + ',' + eyPx(v));
          });
          if (pts.length < 2) return;
          var poly = document.createElementNS(svgNS, 'polyline');
          poly.setAttribute('points', pts.join(' '));
          poly.setAttribute('fill', 'none');
          poly.setAttribute('stroke', s.stroke);
          poly.setAttribute('stroke-width', '1.4');
          poly.setAttribute('stroke-linecap', 'round');
          poly.setAttribute('stroke-linejoin', 'round');
          poly.setAttribute('stroke-dasharray', '6,3');
          poly.setAttribute('class', 'overlay-line overlay-' + sIdx);
          poly.style.display = s.visible ? '' : 'none';
          svg.appendChild(poly);
          overlayPolylines.push(poly);
        });

        // ---- trade markers / event markers on the equity line
        let markerGroup = null;
        if (showTrades && markers.length) {
          markerGroup = document.createElementNS(svgNS, 'g');
          markerGroup.setAttribute('class', 'markers');
          markerGroup.style.pointerEvents = 'none';
          // Strategy backtests use entry/exit triangles. Event studies use one
          // diamond marker per event row so the chart answers “what event
          // happened here?” rather than duplicating entry/exit executions.
          const SIZE = 5.5;
          const OFFSET = 9;
          const labeledCount = markers.filter(function (m) {
            var a = (m.action || '').toLowerCase();
            return a === 'buy' || a === 'short' || a === 'event';
          }).length;
          const DATE_LABEL_LANES = 2;
          const EVENT_LABEL_LANES = 2;
          function estimateLabelWidth(text, isEventLabel) {
            var chars = Array.from(String(text || '')).length;
            return Math.max(isEventLabel ? 44 : 30, chars * (isEventLabel ? 8.2 : 6.8));
          }
          function assignLabelLane(laneEnds, leftEdge, rightEdge) {
            for (var lane = 0; lane < laneEnds.length; lane++) {
              if (leftEdge > laneEnds[lane]) {
                laneEnds[lane] = rightEdge;
                return lane;
              }
            }
            return null;
          }
          const labeledMarkersSorted = markers
            .filter(function (m) {
              var a = (m.action || '').toLowerCase();
              return a === 'buy' || a === 'short' || a === 'event';
            })
            .slice()
            .sort(function (a, b) { return a._idx - b._idx; });
          const dateLaneEnds = Array(DATE_LABEL_LANES).fill(-Infinity);
          const eventLaneEnds = Array(EVENT_LABEL_LANES).fill(-Infinity);
          labeledMarkersSorted.forEach(function (m) {
            var cx = eqLinePts[m._idx][0];
            if (labeledCount <= 30 && m.date) {
              var dateText = String(m.date).slice(5);
              var dateWidth = estimateLabelWidth(dateText, false);
              m._inlineDateText = dateText;
              m._inlineDateLane = assignLabelLane(
                dateLaneEnds,
                cx - dateWidth / 2 - 8,
                cx + dateWidth / 2 + 8
              );
            } else {
              m._inlineDateLane = null;
            }
            if (labeledCount <= 20 && m.label) {
              var labelText = String(m.label);
              if (labelText.length > 12) labelText = labelText.slice(0, 12) + '…';
              var eventWidth = estimateLabelWidth(labelText, true);
              m._inlineEventText = labelText;
              m._inlineEventLane = assignLabelLane(
                eventLaneEnds,
                cx - eventWidth / 2 - 10,
                cx + eventWidth / 2 + 10
              );
            } else {
              m._inlineEventLane = null;
            }
          });
          markers.forEach(function (m) {
            const i = m._idx;
            if (i < 0 || i >= eqLinePts.length) return;
            const cx = eqLinePts[i][0];
            const cy = eqLinePts[i][1];
            const action = (m.action || '').toLowerCase();
            const isEvent = action === 'event';
            const isBullish = action === 'buy' || action === 'cover';
            const isEntry = action === 'buy' || action === 'short';
            const outcome = m.pnl != null ? Number(m.pnl) : (m.pnl_pct != null ? Number(m.pnl_pct) : null);
            const accentColor = cs.getPropertyValue('--accent').trim() || '#2962ff';
            const color = isEvent
              ? (Number.isFinite(outcome) ? (outcome >= 0 ? gainColor : lossColor) : accentColor)
              : (isBullish ? gainColor : lossColor);
            const markerEl = document.createElementNS(svgNS, 'polygon');
            if (isEvent) {
              const diamondHalf = SIZE + 0.8;
              markerEl.setAttribute('points',
                cx + ',' + (cy - diamondHalf) + ' ' +
                (cx + diamondHalf) + ',' + cy + ' ' +
                cx + ',' + (cy + diamondHalf) + ' ' +
                (cx - diamondHalf) + ',' + cy);
            } else {
              // entry markers below the curve point UP at the line; exit markers
              // above the curve point DOWN at the line.
              const apexY  = isEntry ? cy + OFFSET : cy - OFFSET;
              const flareY = isEntry ? cy + OFFSET + SIZE * 1.7 : cy - OFFSET - SIZE * 1.7;
              markerEl.setAttribute('points',
                cx + ',' + apexY + ' ' +
                (cx - SIZE) + ',' + flareY + ' ' +
                (cx + SIZE) + ',' + flareY);
            }
            markerEl.setAttribute('fill', color);
            markerEl.setAttribute('stroke', bgColor);
            markerEl.setAttribute('stroke-width', isEvent ? '1.5' : '1.2');
            markerEl.setAttribute('stroke-linejoin', 'round');
            markerEl.setAttribute('class', 'marker-tri');
            markerEl.style.pointerEvents = 'auto';
            markerEl.style.cursor = 'pointer';

            // store metadata so the hover handler can render a rich tooltip
            markerEl._marker = m;
            markerEl._cx = cx;
            markerEl._cy = cy;
            markerEl.addEventListener('pointerenter', function () {
              const labels = {
                buy:   t('marker_buy',   '买入'),
                sell:  t('marker_sell',  '卖出'),
                short: t('marker_short', '做空'),
                cover: t('marker_cover', '平空'),
                event: t('marker_event', '事件'),
              };
              const actionLabel = labels[action] || action;
              let rows =
                '<div class="tooltip-date">' + escapeHtml(m.date) + '</div>' +
                '<div class="tooltip-row"><span class="key" style="--swatch:' + color + '">' + escapeHtml(actionLabel) + '</span>' +
                '<span class="val" style="color:' + color + '">' + (isEvent ? '◆' : (isBullish ? '▲' : '▼')) + '</span></div>';
              if (m.label) {
                rows += '<div class="tooltip-row"><span class="key" style="--swatch:' + mutedColor + '">' + escapeHtml(String(m.label)) + '</span></div>';
              }
              if (m.symbol) {
                rows += '<div class="tooltip-row"><span class="key" style="--swatch:' + mutedColor + '">' + escapeHtml(t('trades_col_symbol', '标的')) + '</span><span class="val">' + escapeHtml(String(m.symbol)) + '</span></div>';
              }
              if (m.entry_date) {
                rows += '<div class="tooltip-row"><span class="key" style="--swatch:' + mutedColor + '">' + escapeHtml(t('trades_col_entry_date', '开仓日')) + '</span><span class="val">' + escapeHtml(String(m.entry_date)) + '</span></div>';
              }
              if (m.exit_date) {
                rows += '<div class="tooltip-row"><span class="key" style="--swatch:' + mutedColor + '">' + escapeHtml(t('trades_col_exit_date', '平仓日')) + '</span><span class="val">' + escapeHtml(String(m.exit_date)) + '</span></div>';
              }
              if (!isEvent && m.price != null) {
                rows += '<div class="tooltip-row"><span class="key" style="--swatch:' + mutedColor + '">Price</span><span class="val">' + nf(m.price, 2) + '</span></div>';
              }
              if (isEvent && m.entry_price != null) {
                rows += '<div class="tooltip-row"><span class="key" style="--swatch:' + mutedColor + '">' + escapeHtml(t('trades_col_entry_price', '开仓价')) + '</span><span class="val">' + nf(m.entry_price, 2) + '</span></div>';
              }
              if (isEvent && m.exit_price != null) {
                rows += '<div class="tooltip-row"><span class="key" style="--swatch:' + mutedColor + '">' + escapeHtml(t('trades_col_exit_price', '平仓价')) + '</span><span class="val">' + nf(m.exit_price, 2) + '</span></div>';
              }
              if (m.size != null) {
                rows += '<div class="tooltip-row"><span class="key" style="--swatch:' + mutedColor + '">Size</span><span class="val">' + nf(m.size, 0) + '</span></div>';
              }
              if (m.pnl != null || m.pnl_pct != null) {
                const pnlBase = m.pnl != null ? Number(m.pnl) : Number(m.pnl_pct);
                const pnlCls = pnlBase >= 0 ? 'positive' : 'negative';
                const pnlText = m.pnl != null
                  ? signed(m.pnl, 2) + (m.pnl_pct != null ? ' (' + signed(m.pnl_pct, 2, '%') + ')' : '')
                  : signed(m.pnl_pct, 2, '%');
                rows += '<div class="tooltip-row"><span class="key" style="--swatch:' + (pnlBase >= 0 ? gainColor : lossColor) + '">' + escapeHtml(t('marker_pnl', '盈亏')) + '</span><span class="val ' + pnlCls + '">' + pnlText + '</span></div>';
              }
              tooltip.classList.remove('hidden');
              tooltip.innerHTML = rows;
              const shellRect = wrap.getBoundingClientRect();
              const ttRect = tooltip.getBoundingClientRect();
              const isLeft = cx > (W / 2);
              tooltip.style.left = (isLeft ? 18 : Math.max(18, shellRect.width - ttRect.width - 18)) + 'px';
              tooltip.style.top = '18px';
            });
            markerEl.addEventListener('pointerleave', function () {
              tooltip.classList.add('hidden');
            });
            markerGroup.appendChild(markerEl);

            // ---- inline labels for entry/event markers ----
            if ((isEntry || isEvent) && m._inlineDateLane !== null && m._inlineDateText) {
              var labelY = eqTop + 18 + m._inlineDateLane * 12;
              var dateLbl = document.createElementNS(svgNS, 'text');
              dateLbl.setAttribute('x', cx);
              dateLbl.setAttribute('y', labelY);
              dateLbl.setAttribute('text-anchor', 'middle');
              dateLbl.setAttribute('font-size', '10');
              dateLbl.setAttribute('font-weight', '500');
              dateLbl.setAttribute('fill', strongMuted);
              dateLbl.setAttribute('stroke', bgColor);
              dateLbl.setAttribute('stroke-width', '3');
              dateLbl.setAttribute('stroke-linejoin', 'round');
              dateLbl.setAttribute('paint-order', 'stroke');
              dateLbl.style.pointerEvents = 'none';
              dateLbl.textContent = m._inlineDateText;
              markerGroup.appendChild(dateLbl);

              // ---- event label (only when ≤ 20 entry events) ----
              // Truncate at 12 chars, show full text in hover tooltip.
              if (m._inlineEventLane !== null && m._inlineEventText) {
                var evtY = eqTop + 46 + m._inlineEventLane * 12;
                var evtLbl = document.createElementNS(svgNS, 'text');
                evtLbl.setAttribute('x', cx);
                evtLbl.setAttribute('y', evtY);
                evtLbl.setAttribute('text-anchor', 'middle');
                evtLbl.setAttribute('font-size', '10');
                evtLbl.setAttribute('font-weight', '500');
                evtLbl.setAttribute('fill', strongMuted);
                evtLbl.setAttribute('stroke', bgColor);
                evtLbl.setAttribute('stroke-width', '3');
                evtLbl.setAttribute('stroke-linejoin', 'round');
                evtLbl.setAttribute('paint-order', 'stroke');
                evtLbl.style.pointerEvents = 'none';
                evtLbl.textContent = m._inlineEventText;
                markerGroup.appendChild(evtLbl);
              }
            }
          });
          svg.appendChild(markerGroup);
        }

        // ---- drawdown pane
        if (showDrawdown) {
          // dd grid
          for (let i = 0; i <= 2; i++) {
            const y = ddTop + (i / 2) * DD_H;
            const line = document.createElementNS(svgNS, 'line');
            line.setAttribute('x1', PAD_L);
            line.setAttribute('y1', y);
            line.setAttribute('x2', PAD_L + INNER_W);
            line.setAttribute('y2', y);
            line.setAttribute('stroke', gridColor);
            line.setAttribute('stroke-width', '1');
            svg.appendChild(line);
            const val = ddMax - (i / 2) * (ddMax - ddMin);
            const label = document.createElementNS(svgNS, 'text');
            label.setAttribute('x', W - 10);
            label.setAttribute('y', y + 4);
            label.setAttribute('text-anchor', 'end');
            label.setAttribute('fill', mutedColor);
            label.setAttribute('font-size', '10');
            label.textContent = nf(val, 1) + '%';
            svg.appendChild(label);
          }
          // dd label
          const ddLabel = document.createElementNS(svgNS, 'text');
          ddLabel.setAttribute('x', PAD_L + 8);
          ddLabel.setAttribute('y', ddTop + 14);
          ddLabel.setAttribute('fill', mutedColor);
          ddLabel.setAttribute('font-size', '10');
          ddLabel.setAttribute('font-weight', '700');
          ddLabel.setAttribute('letter-spacing', '0.08em');
          ddLabel.textContent = t('drawdown_pane', 'DRAWDOWN');
          svg.appendChild(ddLabel);

          // dd area
          const ddZeroY = dyPx(0);
          const ddLinePts = ddVals.map(function (v, i) { return [xPx(i), dyPx(v)]; });
          const ddGradId = 'dd-grad-' + idx;
          const ddGrad = document.createElementNS(svgNS, 'linearGradient');
          ddGrad.setAttribute('id', ddGradId);
          ddGrad.setAttribute('x1', '0');
          ddGrad.setAttribute('y1', '0');
          ddGrad.setAttribute('x2', '0');
          ddGrad.setAttribute('y2', '1');
          const ds1 = document.createElementNS(svgNS, 'stop');
          ds1.setAttribute('offset', '0%');
          ds1.setAttribute('stop-color', lossColor);
          ds1.setAttribute('stop-opacity', '0.04');
          const ds2 = document.createElementNS(svgNS, 'stop');
          ds2.setAttribute('offset', '100%');
          ds2.setAttribute('stop-color', lossColor);
          ds2.setAttribute('stop-opacity', '0.36');
          ddGrad.appendChild(ds1);
          ddGrad.appendChild(ds2);
          defs.appendChild(ddGrad);

          const ddAreaD =
            'M ' + ddLinePts[0][0] + ',' + ddZeroY + ' ' +
            ddLinePts.map(function (pt) { return 'L ' + pt[0] + ',' + pt[1]; }).join(' ') +
            ' L ' + ddLinePts[N - 1][0] + ',' + ddZeroY + ' Z';
          const ddArea = document.createElementNS(svgNS, 'path');
          ddArea.setAttribute('d', ddAreaD);
          ddArea.setAttribute('fill', 'url(#' + ddGradId + ')');
          ddArea.setAttribute('class', 'dd-area');
          svg.appendChild(ddArea);

          const ddLine = document.createElementNS(svgNS, 'polyline');
          ddLine.setAttribute('points', ddLinePts.map(function (pt) { return pt[0] + ',' + pt[1]; }).join(' '));
          ddLine.setAttribute('fill', 'none');
          ddLine.setAttribute('stroke', lossColor);
          ddLine.setAttribute('stroke-width', '1.2');
          ddLine.setAttribute('stroke-linecap', 'round');
          ddLine.setAttribute('class', 'dd-line');
          svg.appendChild(ddLine);
        }

        // ---- x axis ticks (labels only)
        const tickCount = Math.max(4, Math.min(10, Math.round(W / 140)));
        for (let i = 0; i < tickCount; i++) {
          const idx2 = Math.round((N - 1) * (i / Math.max(1, tickCount - 1)));
          const x = xPx(idx2);
          const lab = axisLabel(points[idx2]);
          const t = document.createElementNS(svgNS, 'text');
          t.setAttribute('x', x);
          t.setAttribute('y', xAxisY + 16);
          t.setAttribute('text-anchor', 'middle');
          t.setAttribute('fill', mutedColor);
          t.setAttribute('font-size', '11');
          t.textContent = lab;
          svg.appendChild(t);
        }

        // ---- crosshair group
        const ch = document.createElementNS(svgNS, 'g');
        ch.setAttribute('id', 'crosshair-' + idx);
        ch.style.display = 'none';
        ch.style.pointerEvents = 'none';

        const chV = document.createElementNS(svgNS, 'line');
        chV.setAttribute('y1', eqTop);
        chV.setAttribute('y2', showDrawdown ? ddBot : eqBot);
        chV.setAttribute('stroke', cs.getPropertyValue('--crosshair').trim() || 'rgba(160,167,184,0.5)');
        chV.setAttribute('stroke-width', '1');
        chV.setAttribute('stroke-dasharray', '3 3');
        chV.setAttribute('class', 'ch-v');
        ch.appendChild(chV);

        const chHEq = document.createElementNS(svgNS, 'line');
        chHEq.setAttribute('x1', PAD_L);
        chHEq.setAttribute('x2', PAD_L + INNER_W);
        chHEq.setAttribute('stroke', cs.getPropertyValue('--crosshair').trim() || 'rgba(160,167,184,0.5)');
        chHEq.setAttribute('stroke-width', '1');
        chHEq.setAttribute('stroke-dasharray', '3 3');
        chHEq.setAttribute('class', 'ch-h-eq');
        ch.appendChild(chHEq);

        const chDot = document.createElementNS(svgNS, 'circle');
        chDot.setAttribute('r', '4.5');
        chDot.setAttribute('fill', bgColor);
        chDot.setAttribute('stroke', eqColor);
        chDot.setAttribute('stroke-width', '2');
        chDot.setAttribute('class', 'ch-dot');
        ch.appendChild(chDot);

        const chYbg = document.createElementNS(svgNS, 'rect');
        chYbg.setAttribute('x', PAD_L + INNER_W + 2);
        chYbg.setAttribute('width', W - PAD_L - INNER_W - 6);
        chYbg.setAttribute('height', '18');
        chYbg.setAttribute('rx', '3');
        chYbg.setAttribute('fill', eqColor);
        chYbg.setAttribute('class', 'ch-yval-bg');
        ch.appendChild(chYbg);

        const chYtxt = document.createElementNS(svgNS, 'text');
        chYtxt.setAttribute('x', W - 10);
        chYtxt.setAttribute('text-anchor', 'end');
        chYtxt.setAttribute('fill', '#fff');
        chYtxt.setAttribute('font-size', '11');
        chYtxt.setAttribute('font-weight', '700');
        chYtxt.setAttribute('dominant-baseline', 'middle');
        chYtxt.setAttribute('class', 'ch-yval');
        ch.appendChild(chYtxt);

        const chXbg = document.createElementNS(svgNS, 'rect');
        chXbg.setAttribute('width', '90');
        chXbg.setAttribute('height', '20');
        chXbg.setAttribute('rx', '3');
        chXbg.setAttribute('fill', surfaceColor);
        chXbg.setAttribute('stroke', borderStrong);
        chXbg.setAttribute('y', xAxisY + 4);
        chXbg.setAttribute('class', 'ch-xval-bg');
        ch.appendChild(chXbg);

        const chXtxt = document.createElementNS(svgNS, 'text');
        chXtxt.setAttribute('y', xAxisY + 18);
        chXtxt.setAttribute('text-anchor', 'middle');
        chXtxt.setAttribute('fill', strongMuted);
        chXtxt.setAttribute('font-size', '11');
        chXtxt.setAttribute('font-weight', '600');
        chXtxt.setAttribute('class', 'ch-xval');
        ch.appendChild(chXtxt);

        svg.appendChild(ch);

        // ---- transparent overlay
        const overlay = document.createElementNS(svgNS, 'rect');
        overlay.setAttribute('x', PAD_L);
        overlay.setAttribute('y', eqTop);
        overlay.setAttribute('width', INNER_W);
        overlay.setAttribute('height', (showDrawdown ? ddBot : eqBot) - eqTop);
        overlay.setAttribute('fill', 'transparent');
        overlay.style.cursor = 'crosshair';
        svg.appendChild(overlay);

        // Re-append markerGroup AFTER overlay so triangles are on top and can
        // receive pointer events. Otherwise overlay (fill:transparent) intercepts
        // them and the marker tooltip never fires. (Re-appending a node already
        // in the tree just moves it to the end — no duplication.)
        if (markerGroup) svg.appendChild(markerGroup);

        // ---- animations on first render
        if (firstRender) {
          firstRender = false;
          try {
            const len = linePoly.getTotalLength();
            linePoly.style.strokeDasharray = len;
            linePoly.style.strokeDashoffset = len;
            linePoly.style.transition = 'stroke-dashoffset 1.6s cubic-bezier(0.25, 0.1, 0.25, 1)';
            requestAnimationFrame(function () { linePoly.style.strokeDashoffset = '0'; });
          } catch (e) { /* ignore */ }
          areaPath.style.opacity = '0';
          areaPath.style.transition = 'opacity 0.9s ease 0.35s';
          requestAnimationFrame(function () { areaPath.style.opacity = '1'; });
          const ddArea = svg.querySelector('.dd-area');
          if (ddArea) {
            ddArea.style.opacity = '0';
            ddArea.style.transition = 'opacity 0.8s ease 0.55s';
            requestAnimationFrame(function () { ddArea.style.opacity = '1'; });
          }
        }

        // ---- interaction
        function onMove(evt) {
          const rect = svg.getBoundingClientRect();
          const x = evt.clientX - rect.left;
          if (x < PAD_L || x > PAD_L + INNER_W) {
            ch.style.display = 'none';
            tooltip.classList.add('hidden');
            return;
          }
          const ratio = (x - PAD_L) / INNER_W;
          const i = Math.max(0, Math.min(N - 1, Math.round(ratio * (N - 1))));
          const point = points[i];
          const xCoord = xPx(i);
          const eqV = eqVals[i];
          const ddV = ddVals[i];
          const eqYCoord = eyPx(eqV);

          ch.style.display = '';
          chV.setAttribute('x1', xCoord);
          chV.setAttribute('x2', xCoord);
          chHEq.setAttribute('y1', eqYCoord);
          chHEq.setAttribute('y2', eqYCoord);
          chDot.setAttribute('cx', xCoord);
          chDot.setAttribute('cy', eqYCoord);
          chYbg.setAttribute('y', eqYCoord - 9);
          chYtxt.setAttribute('y', eqYCoord);
          chYtxt.textContent = nf(eqV, 2) + (mode === 'percentage' ? '%' : '');
          chXbg.setAttribute('x', Math.max(PAD_L, Math.min(PAD_L + INNER_W - 90, xCoord - 45)));
          chXtxt.setAttribute('x', Math.max(PAD_L + 45, Math.min(PAD_L + INNER_W - 45, xCoord)));
          chXtxt.textContent = fullLabel(point);

          const baseEq = Number(points[0].equity);
          const ret = baseEq ? ((Number(point.equity) / baseEq - 1) * 100) : 0;

          tooltip.classList.remove('hidden');
          var ttHtml = '<div class="tooltip-date">' + escapeHtml(fullLabel(point)) + '</div>';
          if (!module.hide_value_row) {
            ttHtml += '<div class="tooltip-row"><span class="key" style="--swatch:' + eqColor + '">' +
              escapeHtml(module.value_label || t('tooltip_equity', '权益')) +
              '</span><span class="val">' + nf(Number(point.equity), 2) + '</span></div>';
          }
          ttHtml += '<div class="tooltip-row"><span class="key" style="--swatch:' + eqColor + '">' +
            escapeHtml(module.return_label || t('tooltip_return', '收益')) +
            '</span><span class="val ' + (ret >= 0 ? 'positive' : 'negative') + '">' +
            signed(ret, 2, '%') + '</span></div>';
          if (!module.hide_drawdown_tooltip) {
            ttHtml += '<div class="tooltip-row"><span class="key" style="--swatch:' + lossColor + '">' +
              escapeHtml(t('tooltip_drawdown', '回撤')) +
              '</span><span class="val negative">' + nf(ddV, 2) + '%</span></div>';
          }
          // overlay values in tooltip
          overlaySeries.forEach(function (s) {
            if (!s.visible) return;
            var v = s.vals[i];
            if (v == null) return;
            ttHtml += '<div class="tooltip-row"><span class="key" style="--swatch:' + s.stroke + '">' + escapeHtml(s.name) + '</span><span class="val">' + nf(v, 2) + (mode === 'percentage' ? '%' : '') + '</span></div>';
          });
          tooltip.innerHTML = ttHtml;

          const shellRect = wrap.getBoundingClientRect();
          const ttRect = tooltip.getBoundingClientRect();
          const localX = evt.clientX - shellRect.left;
          const isLeft = localX > shellRect.width / 2;
          tooltip.style.left = (isLeft ? 18 : Math.max(18, shellRect.width - ttRect.width - 18)) + 'px';
          tooltip.style.top = '18px';
        }
        function onLeave() {
          ch.style.display = 'none';
          tooltip.classList.add('hidden');
        }
        overlay.addEventListener('pointermove', onMove);
        overlay.addEventListener('pointerleave', onLeave);
      }

      render();

      // resize
      if (window.ResizeObserver) {
        const ro = new ResizeObserver(function () { render(); });
        ro.observe(wrap);
      } else {
        window.addEventListener('resize', render);
      }

      return {
        setMode: function (m) { mode = m; firstRender = false; render(); },
        toggleDrawdown: function () { showDrawdown = !showDrawdown; firstRender = false; render(); return showDrawdown; },
        toggleTrades: function () { showTrades = !showTrades; firstRender = false; render(); return showTrades; },
        toggleOverlay: function (sIdx) {
          if (overlaySeries[sIdx]) {
            overlaySeries[sIdx].visible = !overlaySeries[sIdx].visible;
            firstRender = false;
            render();
            return overlaySeries[sIdx].visible;
          }
        },
        rerender: render,
      };
    }

    // ---------------- chart engine: multi-line ----------------
    function buildMultiLineChart(host, module, idx) {
      const series = module.series || [];

      const wrap = document.createElement('div');
      wrap.className = 'chart-shell';
      wrap.style.height = '460px';

      const tooltip = document.createElement('div');
      tooltip.className = 'tooltip hidden';
      wrap.appendChild(tooltip);

      const svgNS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(svgNS, 'svg');
      wrap.appendChild(svg);
      host.appendChild(wrap);

      const colors = ['#26a69a', '#2962ff', '#ef5350', '#b57eff', '#ff9800', '#f59e0b'];

      let firstRender = true;

      function render() {
        const W = wrap.clientWidth || 1200;
        const H = wrap.clientHeight || 460;
        svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
        svg.setAttribute('width', W);
        svg.setAttribute('height', H);
        svg.innerHTML = '';

        if (!series.length) {
          svg.innerHTML = '<text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#787b86" font-size="14">' + escapeHtml(t('empty_data', '暂无数据')) + '</text>';
          return;
        }

        const PAD_L = 16, PAD_R = 78, TOP = 22, BOT = 56;
        const INNER_W = W - PAD_L - PAD_R;
        const INNER_H = H - TOP - BOT;

        const allValues = [];
        series.forEach(function (s) {
          (s.points || []).forEach(function (p) {
            const v = Number(p.value);
            if (Number.isFinite(v)) allValues.push(v);
          });
        });
        if (!allValues.length) return;

        let minY = Math.min.apply(null, allValues);
        let maxY = Math.max.apply(null, allValues);
        if (minY === maxY) { minY -= 1; maxY += 1; }
        const padY = (maxY - minY) * 0.10;
        minY -= padY; maxY += padY;

        const refSeries = series.reduce(function (a, b) {
          return (b.points || []).length > (a.points || []).length ? b : a;
        }, series[0]);
        const refPts = refSeries.points || [];
        const N = refPts.length;

        const xPx = function (i) {
          if (N <= 1) return PAD_L + INNER_W / 2;
          return PAD_L + (i / (N - 1)) * INNER_W;
        };
        const yPx = function (v) {
          return TOP + (1 - (v - minY) / (maxY - minY)) * INNER_H;
        };

        const cs = getComputedStyle(ROOT);
        const gridColor = cs.getPropertyValue('--grid').trim() || 'rgba(255,255,255,0.04)';
        const mutedColor = cs.getPropertyValue('--muted').trim() || '#787b86';
        const crosshairColor = cs.getPropertyValue('--crosshair').trim() || 'rgba(160,167,184,0.5)';
        const bgColor = cs.getPropertyValue('--bg').trim() || '#ffffff';

        // grid (5 steps 对齐 overview_chart)
        const gridSteps = 5;
        for (let i = 0; i <= gridSteps; i++) {
          const y = TOP + (i / gridSteps) * INNER_H;
          const line = document.createElementNS(svgNS, 'line');
          line.setAttribute('x1', PAD_L);
          line.setAttribute('y1', y);
          line.setAttribute('x2', PAD_L + INNER_W);
          line.setAttribute('y2', y);
          line.setAttribute('stroke', gridColor);
          line.setAttribute('stroke-width', '1');
          svg.appendChild(line);

          const val = maxY - (i / gridSteps) * (maxY - minY);
          const lab = document.createElementNS(svgNS, 'text');
          lab.setAttribute('x', W - 10);
          lab.setAttribute('y', y + 4);
          lab.setAttribute('text-anchor', 'end');
          lab.setAttribute('fill', mutedColor);
          lab.setAttribute('font-size', '11');
          lab.textContent = nf(val, 2);
          svg.appendChild(lab);
        }

        // gradient defs (每条线一个淡色渐变，多线叠加用低透明度保持清爽)
        const defs = document.createElementNS(svgNS, 'defs');
        series.forEach(function (s, sIdx) {
          const color = colors[sIdx % colors.length];
          const grad = document.createElementNS(svgNS, 'linearGradient');
          grad.setAttribute('id', 'mlc-grad-' + idx + '-' + sIdx);
          grad.setAttribute('x1', '0'); grad.setAttribute('y1', '0');
          grad.setAttribute('x2', '0'); grad.setAttribute('y2', '1');
          const stop1 = document.createElementNS(svgNS, 'stop');
          stop1.setAttribute('offset', '0%');
          stop1.setAttribute('stop-color', color);
          stop1.setAttribute('stop-opacity', '0.14');
          const stop2 = document.createElementNS(svgNS, 'stop');
          stop2.setAttribute('offset', '100%');
          stop2.setAttribute('stop-color', color);
          stop2.setAttribute('stop-opacity', '0');
          grad.appendChild(stop1);
          grad.appendChild(stop2);
          defs.appendChild(grad);
        });
        svg.appendChild(defs);

        // 前填充(forward-fill)：停牌期间 value 为 null/NaN 时，用上一个有效
        // 值画平线（停牌不改变净值的实际表现），而不是让线断开或掉到 0。
        // 开头还没有有效值的点直接跳过（没法往前填）。
        // seriesFilled[sIdx][i] = 该 series 第 i 个点的前填充值(null 表示还没有)
        //
        // ⚠️ 必须显式判断 null/undefined/空串，不能直接 Number() —— JS 陷阱：
        //    Number(null) === 0（不是 NaN），Number.isFinite(0) === true，
        //    会把停牌天当成"0 净值"画到图底，出现矩形 dip。
        const seriesFilled = series.map(function (s) {
          let lastValid = null;
          return (s.points || []).map(function (p) {
            const raw = p ? p.value : null;
            if (raw === null || raw === undefined || raw === '') return lastValid;
            const v = Number(raw);
            if (Number.isFinite(v)) { lastValid = v; return v; }
            return lastValid;
          });
        });

        // series（先面积再折线，后画的在上）
        const seriesEls = [];
        series.forEach(function (s, sIdx) {
          const filled = seriesFilled[sIdx];
          const pts = [];
          filled.forEach(function (v, i) {
            if (v !== null) pts.push([xPx(i), yPx(v)]);
          });
          if (!pts.length) return;
          const color = colors[sIdx % colors.length];

          // area fill with gradient
          const areaD =
            'M ' + pts[0][0] + ',' + (TOP + INNER_H) + ' ' +
            pts.map(function (pt) { return 'L ' + pt[0] + ',' + pt[1]; }).join(' ') +
            ' L ' + pts[pts.length - 1][0] + ',' + (TOP + INNER_H) + ' Z';
          const areaPath = document.createElementNS(svgNS, 'path');
          areaPath.setAttribute('d', areaD);
          areaPath.setAttribute('fill', 'url(#mlc-grad-' + idx + '-' + sIdx + ')');
          svg.appendChild(areaPath);

          const poly = document.createElementNS(svgNS, 'polyline');
          poly.setAttribute('points', pts.map(function (pt) { return pt[0] + ',' + pt[1]; }).join(' '));
          poly.setAttribute('fill', 'none');
          poly.setAttribute('stroke', color);
          poly.setAttribute('stroke-width', '1.8');
          poly.setAttribute('stroke-linecap', 'round');
          poly.setAttribute('stroke-linejoin', 'round');
          poly.setAttribute('class', 'multi-line');
          svg.appendChild(poly);
          seriesEls.push(poly);
        });

        // x axis ticks
        const tickCount = Math.max(4, Math.min(10, Math.round(W / 140)));
        for (let i = 0; i < tickCount; i++) {
          const idx2 = Math.round((N - 1) * (i / Math.max(1, tickCount - 1)));
          const point = refPts[idx2];
          const x = xPx(idx2);
          const t = document.createElementNS(svgNS, 'text');
          t.setAttribute('x', x);
          t.setAttribute('y', TOP + INNER_H + 22);
          t.setAttribute('text-anchor', 'middle');
          t.setAttribute('fill', mutedColor);
          t.setAttribute('font-size', '11');
          t.textContent = axisLabel(point);
          svg.appendChild(t);
        }

        // legend
        let legendX = PAD_L;
        const legendY = H - 18;
        series.forEach(function (s, sIdx) {
          const color = colors[sIdx % colors.length];
          const sw = document.createElementNS(svgNS, 'rect');
          sw.setAttribute('x', legendX);
          sw.setAttribute('y', legendY - 4);
          sw.setAttribute('width', '14');
          sw.setAttribute('height', '3');
          sw.setAttribute('rx', '1.5');
          sw.setAttribute('fill', color);
          svg.appendChild(sw);
          const label = document.createElementNS(svgNS, 'text');
          label.setAttribute('x', legendX + 22);
          label.setAttribute('y', legendY + 1);
          label.setAttribute('fill', mutedColor);
          label.setAttribute('font-size', '12');
          label.textContent = s.name || ('Series ' + (sIdx + 1));
          svg.appendChild(label);
          legendX += 22 + (s.name || '').length * 7 + 18;
        });

        // crosshair: 垂直虚线 + 每条线交点圆点 + 右侧值 badge
        const ch = document.createElementNS(svgNS, 'g');
        ch.style.display = 'none';
        ch.style.pointerEvents = 'none';
        const chV = document.createElementNS(svgNS, 'line');
        chV.setAttribute('y1', TOP);
        chV.setAttribute('y2', TOP + INNER_H);
        chV.setAttribute('stroke', crosshairColor);
        chV.setAttribute('stroke-width', '1');
        chV.setAttribute('stroke-dasharray', '3 3');
        ch.appendChild(chV);

        // 每条 series 一个 dot（圆点）+ badge（右侧值胶囊）
        const chDots = [];
        const chBadges = [];
        series.forEach(function (s, sIdx) {
          const color = colors[sIdx % colors.length];
          const dot = document.createElementNS(svgNS, 'circle');
          dot.setAttribute('r', '4');
          dot.setAttribute('fill', color);
          dot.setAttribute('stroke', bgColor);
          dot.setAttribute('stroke-width', '2');
          ch.appendChild(dot);
          chDots.push(dot);

          const bg = document.createElementNS(svgNS, 'rect');
          bg.setAttribute('x', PAD_L + INNER_W + 2);
          bg.setAttribute('width', W - PAD_L - INNER_W - 6);
          bg.setAttribute('height', '16');
          bg.setAttribute('rx', '3');
          bg.setAttribute('fill', color);
          ch.appendChild(bg);

          const txt = document.createElementNS(svgNS, 'text');
          txt.setAttribute('x', W - 10);
          txt.setAttribute('text-anchor', 'end');
          txt.setAttribute('fill', '#fff');
          txt.setAttribute('font-size', '10');
          txt.setAttribute('font-weight', '700');
          txt.setAttribute('dominant-baseline', 'middle');
          ch.appendChild(txt);
          chBadges.push({ bg: bg, txt: txt });
        });
        svg.appendChild(ch);

        const overlay = document.createElementNS(svgNS, 'rect');
        overlay.setAttribute('x', PAD_L);
        overlay.setAttribute('y', TOP);
        overlay.setAttribute('width', INNER_W);
        overlay.setAttribute('height', INNER_H);
        overlay.setAttribute('fill', 'transparent');
        overlay.style.cursor = 'crosshair';
        svg.appendChild(overlay);

        if (firstRender) {
          firstRender = false;
          seriesEls.forEach(function (path, i) {
            try {
              const len = path.getTotalLength();
              path.style.strokeDasharray = len;
              path.style.strokeDashoffset = len;
              path.style.transition = 'stroke-dashoffset 1.4s cubic-bezier(0.25, 0.1, 0.25, 1) ' + (i * 0.18) + 's';
              requestAnimationFrame(function () { path.style.strokeDashoffset = '0'; });
            } catch (e) { /* ignore */ }
          });
        }

        overlay.addEventListener('pointermove', function (evt) {
          const rect = svg.getBoundingClientRect();
          const x = evt.clientX - rect.left;
          if (x < PAD_L || x > PAD_L + INNER_W) {
            ch.style.display = 'none';
            tooltip.classList.add('hidden');
            return;
          }
          const ratio = (x - PAD_L) / INNER_W;
          const i = Math.max(0, Math.min(N - 1, Math.round(ratio * (N - 1))));
          const xCoord = xPx(i);

          ch.style.display = '';
          chV.setAttribute('x1', xCoord);
          chV.setAttribute('x2', xCoord);

          // 更新每条线的圆点 + 右侧 badge，排序避免重叠
          // 用前填充后的 seriesFilled 取值，停牌日也能显示最后一个有效值
          const badgeEntries = [];
          series.forEach(function (s, sIdx) {
            const v = (seriesFilled[sIdx] || [])[i];
            const dot = chDots[sIdx];
            const badge = chBadges[sIdx];
            if (v == null) {
              if (dot) dot.style.display = 'none';
              if (badge) { badge.bg.style.display = 'none'; badge.txt.style.display = 'none'; }
              return;
            }
            const yCoord = yPx(v);
            if (dot) {
              dot.style.display = '';
              dot.setAttribute('cx', xCoord);
              dot.setAttribute('cy', yCoord);
            }
            badgeEntries.push({ sIdx: sIdx, y: yCoord, text: nf(v, 2) });
          });
          // y 轴从上往下排，各 badge 间最小间距 18px 防重叠；不超出图区底部
          badgeEntries.sort(function (a, b) { return a.y - b.y; });
          const yMax = TOP + INNER_H - 8;  // 底部留 8px 给 badge 一半高
          let lastY = -Infinity;
          badgeEntries.forEach(function (e) {
            const badge = chBadges[e.sIdx];
            if (!badge) return;
            const y = Math.min(Math.max(lastY + 18, e.y), yMax);
            lastY = y;
            badge.bg.style.display = '';
            badge.txt.style.display = '';
            badge.bg.setAttribute('y', y - 8);
            badge.txt.setAttribute('y', y);
            badge.txt.textContent = e.text;
          });

          const point = refPts[i];
          let rows = '';
          series.forEach(function (s, sIdx) {
            const p = (s.points || [])[i];
            if (!p) return;
            const v = Number(p.value);
            const color = colors[sIdx % colors.length];
            rows += '<div class="tooltip-row"><span class="key" style="--swatch:' + color + '">' + escapeHtml(s.name || ('S' + (sIdx + 1))) + '</span><span class="val">' + nf(v, 2) + '</span></div>';
          });
          tooltip.classList.remove('hidden');
          tooltip.innerHTML = '<div class="tooltip-date">' + escapeHtml(fullLabel(point)) + '</div>' + rows;

          const shellRect = wrap.getBoundingClientRect();
          const ttRect = tooltip.getBoundingClientRect();
          const localX = evt.clientX - shellRect.left;
          const isLeft = localX > shellRect.width / 2;
          tooltip.style.left = (isLeft ? 18 : Math.max(18, shellRect.width - ttRect.width - 18)) + 'px';
          tooltip.style.top = '18px';
        });
        overlay.addEventListener('pointerleave', function () {
          ch.style.display = 'none';
          tooltip.classList.add('hidden');
        });
      }

      render();
      if (window.ResizeObserver) {
        const ro = new ResizeObserver(function () { render(); });
        ro.observe(wrap);
      } else {
        window.addEventListener('resize', render);
      }
    }

    // ---------------- mount charts + interactivity ----------------
    function mountCharts(modules) {
      modules.forEach(function (module, idx) {
        if (module.type === 'overview_chart') {
          const host = document.getElementById('module-host-' + idx);
          if (!host) return;
          const chart = buildOverviewChart(host, module, idx);

          const moduleEl = document.querySelector('[data-module="' + idx + '"]');
          if (!moduleEl) return;

          // toggles
          moduleEl.querySelectorAll('.toggle-item').forEach(function (el) {
            el.addEventListener('click', function () {
              const id = (el.getAttribute('data-toggle') || '').toLowerCase();
              if (id.indexOf('overlay_') === 0) {
                var sIdx = parseInt(id.replace('overlay_', ''), 10);
                var visible = chart.toggleOverlay(sIdx);
                el.classList.toggle('muted', !visible);
              } else if (id.indexOf('drawdown') >= 0) {
                const visible = chart.toggleDrawdown();
                el.classList.toggle('muted', !visible);
              } else if (id.indexOf('trade') >= 0) {
                const visible = chart.toggleTrades();
                el.classList.toggle('muted', !visible);
              } else {
                el.classList.toggle('muted');
              }
            });
          });

          // mode switch
          const modeEls = moduleEl.querySelectorAll('.mode-chip');
          modeEls.forEach(function (el) {
            el.addEventListener('click', function () {
              modeEls.forEach(function (m) { m.classList.remove('active'); });
              el.classList.add('active');
              const id = (el.getAttribute('data-mode') || '').toLowerCase();
              chart.setMode(id === 'percentage' ? 'percentage' : 'absolute');
            });
          });
        } else if (module.type === 'line_chart') {
          const host = document.getElementById('module-host-' + idx);
          if (host) buildMultiLineChart(host, module, idx);
        } else if (module.type === 'custom_html') {
          const host = document.getElementById('module-host-' + idx);
          if (!host) return;
          try {
            host.innerHTML = module.html || '';
            // innerHTML does NOT execute injected script tags — recreate each
            // one so it runs. Supports both inline code and external src=.
            host.querySelectorAll('script').forEach(function (oldScript) {
              const newScript = document.createElement('script');
              for (let i = 0; i < oldScript.attributes.length; i++) {
                const a = oldScript.attributes[i];
                newScript.setAttribute(a.name, a.value);
              }
              newScript.textContent = oldScript.textContent;
              oldScript.parentNode.replaceChild(newScript, oldScript);
            });
            // Optional init callback — host DOM element and module dict are
            // passed in so the script can mount echarts/d3/whatever against
            // the right container.
            if (module.mount_script) {
              try {
                new Function('host', 'module', module.mount_script)(host, module);
              } catch (e) {
                const err = document.createElement('pre');
                err.className = 'custom-html-error';
                err.textContent = 'mount_script error: ' + (e && e.message ? e.message : String(e));
                host.appendChild(err);
              }
            }
          } catch (e) {
            console.error('custom_html render error:', e);
          }
        }
      });
    }

    // ---------------- tabs ----------------
    function buildPanels(modules, tabs) {
      const groups = {};
      tabs.forEach(function (tab) { groups[tab.id] = []; });
      modules.forEach(function (module, idx) {
        const tab = module.tab || tabs[0].id;
        if (!groups[tab]) groups[tab] = [];
        groups[tab].push(renderModule(module, idx));
      });
      return groups;
    }

    function renderTabs(tabs, activeTab, panelsByTab) {
      const tabsEl = document.getElementById('tabs');
      const panelsEl = document.getElementById('tab-panels');

      // Hide the tab bar entirely when there's only one tab — single-page mode.
      if (tabs.length <= 1) {
        tabsEl.style.display = 'none';
      }

      tabsEl.innerHTML = tabs.map(function (tab) {
        return '<button class="tab ' + (tab.id === activeTab ? 'active' : '') + '" data-tab="' + escapeHtml(tab.id) + '">' + escapeHtml(tab.label) + '</button>';
      }).join('') + '<span class="tab-indicator"></span>';

      panelsEl.innerHTML = tabs.map(function (tab) {
        return '<section class="tab-panel ' + (tab.id === activeTab ? 'active' : '') + '" data-tab-panel="' + escapeHtml(tab.id) + '">' +
          '<div class="module-grid">' + (panelsByTab[tab.id] || []).join('') + '</div>' +
        '</section>';
      }).join('');

      function updateIndicator() {
        const indicator = tabsEl.querySelector('.tab-indicator');
        const active = tabsEl.querySelector('.tab.active');
        if (!active || !indicator) return;
        const r = active.getBoundingClientRect();
        const pr = tabsEl.getBoundingClientRect();
        indicator.style.width = r.width + 'px';
        indicator.style.transform = 'translateX(' + (r.left - pr.left) + 'px)';
      }

      tabsEl.querySelectorAll('.tab').forEach(function (btn) {
        btn.addEventListener('click', function () {
          const next = btn.getAttribute('data-tab');
          tabsEl.querySelectorAll('.tab').forEach(function (el) { el.classList.toggle('active', el === btn); });
          panelsEl.querySelectorAll('.tab-panel').forEach(function (panel) {
            panel.classList.toggle('active', panel.getAttribute('data-tab-panel') === next);
          });
          updateIndicator();
        });
      });

      requestAnimationFrame(updateIndicator);
      window.addEventListener('resize', updateIndicator);
    }

    // ---------------- bootstrap ----------------
    const meta = REPORT.meta || {};
    const ui = REPORT.ui || {};
    const tabs = (ui.tabs && ui.tabs.length) ? ui.tabs : [{ id: 'overview', label: 'Overview' }];
    const activeTab = ui.active_tab || tabs[0].id;
    const modules = REPORT.modules || [];

    renderTopbar(meta, ui);
    renderHeader(meta, ui);

    const panelsByTab = buildPanels(modules, tabs);
    renderTabs(tabs, activeTab, panelsByTab);
    mountCharts(modules);
  })();
  </script>
</body>
